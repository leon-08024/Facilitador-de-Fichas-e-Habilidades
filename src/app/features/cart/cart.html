<div class="min-h-screen bg-yellow-50 flex flex-col items-center p-8">
  <h1 class="text-5xl font-extrabold text-yellow-500 mb-8 drop-shadow-md">
    Seu Carrinho
  </h1>

  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-6">
    <div *ngIf="carrinho.length === 0" class="text-gray-500 text-center text-lg">
      Seu carrinho está vazio
    </div>

    <div *ngFor="let item of carrinho; let i = index"
      class="border-b border-yellow-200 py-4 flex justify-between items-center">
      <div>
        <p class="font-bold text-yellow-600">{{ item.tipo }}</p>
        <p class="text-sm text-gray-600">
          {{ item.tempero }} • {{ item.molho }} • {{ item.estilo }} <br>
          {{ item.amor }} • {{ item.profissao }} • {{ item.aleatoria }}
        </p>
        <p class="text-sm mt-1 text-gray-500">Quantidade: {{ item.quantidade }}</p>
      </div>
      <button (click)="removerItem(i)"
        class="bg-red-400 hover:bg-red-500 text-white rounded-lg px-3 py-1 text-sm font-semibold transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </div>
  </div>

  <div class="w-full max-w-3xl mt-6 flex justify-between items-center">
    <button (click)="limparCarrinho()"
      class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg font-semibold transition">
      Esvaziar Carrinho
    </button>

    <button [disabled]="carrinho.length === 0" (click)="finalizarCompra()"
      class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition">
      Finalizar Compra
    </button>
  </div>
</div>
