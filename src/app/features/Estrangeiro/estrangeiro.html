/* Full-body figure — centered, rising from bottom */
.figure {
  position:relative; z-index:2;
  width: min(520px, 75vw);
  height: 100vh;
  display:flex; align-items:flex-end; justify-content:center;
  animation: figure-rise 3s cubic-bezier(.16,1,.3,1) forwards,
             figure-breathe 8s ease-in-out 3s infinite alternate;
  transform: translateY(30px);
  opacity:0;
}
@keyframes figure-rise {
  0%   { opacity:0; transform:translateY(60px) scale(0.97); }
  100% { opacity:1; transform:translateY(0)    scale(1);    }
}
@keyframes figure-breathe {
  0%   { transform:translateY(0)   scale(1);     filter:drop-shadow(0 0 30px rgba(160,210,40,0.15)); }
  100% { transform:translateY(-8px) scale(1.008); filter:drop-shadow(0 0 60px rgba(160,210,40,0.35)); }
}
.figure img {
  height:95vh;
  width:auto;
  object-fit:contain;
  object-position:bottom;
  display:block;
}

/* Eye glow effect layered on figure */
.eye-glow {
  position:absolute;
  top:3%; left:50%;
  transform:translateX(-50%);
  width:120px; height:60px;
  background: radial-gradient(ellipse, rgba(180,230,40,0.5) 0%, rgba(140,200,20,0.15) 50%, transparent 80%);
  border-radius:50%;
  animation: eye-flicker 3s ease-in-out infinite;
  mix-blend-mode: screen;
  pointer-events:none;
}
@keyframes eye-flicker {
  0%,100% { opacity:0.8; transform:translateX(-50%) scale(1); }
  20%      { opacity:1;   transform:translateX(-50%) scale(1.15); }
  21%      { opacity:0.4; transform:translateX(-50%) scale(0.95); }
  22%      { opacity:1;   transform:translateX(-50%) scale(1.1); }
  50%      { opacity:0.7; transform:translateX(-50%) scale(1); }
  80%      { opacity:0.9; transform:translateX(-50%) scale(1.05); }
}

/* ── VHS EFFECTS ── */

/* Scanlines */
.vhs-scanlines {
  position:fixed; inset:0; z-index:10;
  pointer-events:none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.18) 2px,
    rgba(0,0,0,0.18) 4px
  );
}

/* Color bleed / chromatic aberration */
.vhs-chroma {
  position:fixed; inset:0; z-index:11;
  pointer-events:none;
  animation: chroma-shift 0.08s steps(1) infinite;
}
@keyframes chroma-shift {
  0%   { box-shadow: inset 2px 0 0 rgba(255,0,0,0.04), inset -2px 0 0 rgba(0,255,200,0.04); }
  33%  { box-shadow: inset -1px 0 0 rgba(255,0,0,0.06), inset 1px 0 0 rgba(0,255,200,0.03); }
  66%  { box-shadow: inset 3px 0 0 rgba(255,0,0,0.03), inset -3px 0 0 rgba(0,255,200,0.05); }
  100% { box-shadow: inset 0px 0 0 rgba(255,0,0,0), inset 0px 0 0 rgba(0,255,200,0); }
}

/* Horizontal glitch lines */
.vhs-glitch {
  position:fixed; inset:0; z-index:12;
  pointer-events:none;
  animation: glitch-lines 5s steps(1) infinite;
}
@keyframes glitch-lines {
  0%,96%,100% { background:none; }
  97% {
    background:
      linear-gradient(transparent 20%, rgba(160,220,40,0.06) 20%, rgba(160,220,40,0.06) 21%, transparent 21%),
      linear-gradient(transparent 57%, rgba(255,255,255,0.04) 57%, rgba(255,255,255,0.04) 58%, transparent 58%),
      linear-gradient(transparent 73%, rgba(0,200,100,0.05) 73%, rgba(0,200,100,0.05) 74%, transparent 74%);
  }
  98% {
    background:
      linear-gradient(transparent 35%, rgba(160,220,40,0.08) 35%, rgba(160,220,40,0.08) 36.5%, transparent 36.5%),
      linear-gradient(transparent 80%, rgba(255,100,100,0.03) 80%, rgba(255,100,100,0.03) 80.8%, transparent 80.8%);
  }
  99% { background:none; }
}

/* Screen roll — VHS tape artifact */
.vhs-roll {
  position:fixed; inset:0; z-index:13;
  pointer-events:none;
  animation: tape-roll 12s linear infinite;
  opacity:0;
}
@keyframes tape-roll {
  0%,85%,100%  { opacity:0; }
  87% {
    opacity:1;
    background: linear-gradient(
      transparent 0%,
      rgba(255,255,255,0.015) 49%,
      rgba(0,0,0,0.25) 50%,
      transparent 51%
    );
    background-size:100% 8px;
    transform:translateY(-100%);
    animation-timing-function: linear;
  }
  98% {
    opacity:0.6;
    transform:translateY(100%);
  }
}

/* Vignette */
.vhs-vignette {
  position:fixed; inset:0; z-index:9;
  pointer-events:none;
  background: radial-gradient(
    ellipse 85% 90% at 50% 50%,
    transparent 50%,
    rgba(0,0,0,0.5) 80%,
    rgba(0,0,0,0.85) 100%
  );
}

/* Green phosphor tint */
.vhs-tint {
  position:fixed; inset:0; z-index:8;
  pointer-events:none;
  background: rgba(10,30,5,0.12);
  mix-blend-mode: multiply;
}

/* Screen flicker */
.vhs-flicker {
  position:fixed; inset:0; z-index:14;
  pointer-events:none;
  animation: screen-flicker 0.15s steps(1) infinite;
}
@keyframes screen-flicker {
  0%    { opacity:1; }
  92%   { opacity:1; }
  92.5% { opacity:0.88; }
  93%   { opacity:1; }
  97%   { opacity:1; }
  97.3% { opacity:0.92; }
  97.6% { opacity:1; }
  100%  { opacity:1; }
}

/* ── REC INDICATOR ── */
.rec-hud {
  position:fixed; top:1.5rem; left:1.8rem; z-index:20;
  display:flex; align-items:center; gap:0.5rem;
  animation: hud-enter 1s 2s ease backwards;
}
@keyframes hud-enter { from { opacity:0; } to { opacity:1; } }
.rec-dot {
  width:10px; height:10px; border-radius:50%;
  background:#e02020;
  box-shadow:0 0 8px #e02020;
  animation: rec-blink 1s steps(1) infinite;
}
@keyframes rec-blink {
  0%,49% { opacity:1; }
  50%,100% { opacity:0; }
}
.rec-text {
  font-family: 'Courier New', monospace;
  font-size:0.75rem;
  font-weight:bold;
  color:#e02020;
  letter-spacing:0.15em;
  text-shadow:0 0 6px #e02020;
}
.hud-time {
  position:fixed; top:1.5rem; right:1.8rem; z-index:20;
  font-family:'Courier New', monospace;
  font-size:0.7rem;
  color:rgba(200,230,180,0.7);
  letter-spacing:0.1em;
  text-shadow:0 0 4px rgba(160,210,40,0.4);
  animation: hud-enter 1s 2s ease backwards;
}
.hud-date {
  position:fixed; bottom:1.5rem; left:1.8rem; z-index:20;
  font-family:'Courier New', monospace;
  font-size:0.65rem;
  color:rgba(200,230,180,0.5);
  letter-spacing:0.08em;
  animation: hud-enter 1s 2.5s ease backwards;
}
.hud-tape {
  position:fixed; bottom:1.5rem; right:1.8rem; z-index:20;
  font-family:'Courier New', monospace;
  font-size:0.6rem;
  color:rgba(200,230,180,0.4);
  letter-spacing:0.12em;
  animation: hud-enter 1s 2.5s ease backwards;
}

/* ── STATIC NOISE OVERLAY ── */
.vhs-noise {
  position:fixed; inset:0; z-index:7;
  pointer-events:none;
  opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: noise-shift 0.05s steps(1) infinite;
}
@keyframes noise-shift {
  0%   { background-position: 0 0; }
  10%  { background-position: -5px -10px; }
  20%  { background-position: -15px 5px; }
  30%  { background-position: 7px -25px; }
  40%  { background-position: -5px 25px; }
  50%  { background-position: -15px 10px; }
  60%  { background-position: 15px 0; }
  70%  { background-position: 0 15px; }
  80%  { background-position: 3px 35px; }
  90%  { background-position: -10px 10px; }
  100% { background-position: 0 0; }
}

/* ── INTRO STATIC ── */
.intro-static {
  position:fixed; inset:0; z-index:100;
  background:#000;
  pointer-events:none;
  animation: static-intro 2.5s ease forwards;
}
@keyframes static-intro {
  0%   { opacity:1; }
  60%  { opacity:1; }
  100% { opacity:0; pointer-events:none; }
}
.intro-static::before {
  content:'';
  position:absolute; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/%3E%3C/svg%3E");
  opacity:0.3;
  animation: noise-shift 0.05s steps(1) infinite;
}

/* ── LOGOUT (hidden until hover near top-right) ── */
.logout-zone {
  position:fixed; top:0; right:0;
  width:80px; height:60px;
  z-index:50;
  cursor:pointer;
}
.logout-btn {
  position:fixed; top:1.5rem; right:1.8rem;
  font-family:'Courier New', monospace;
  font-size:0.6rem;
  letter-spacing:0.2em;
  color:rgba(200,230,180,0.0);
  border:1px solid rgba(200,230,180,0);
  background:transparent;
  padding:0.3rem 0.8rem;
  cursor:pointer;
  z-index:50;
  transition:all 0.3s;
  pointer-events:none;
  margin-top:1.5rem;
}
.logout-zone:hover ~ .logout-btn,
.logout-btn:hover {
  color:rgba(200,230,180,0.7);
  border-color:rgba(200,230,180,0.3);
  pointer-events:all;
}
</style>
</head>
<body>

<!-- Intro tape static -->
<div class="intro-static"></div>

<!-- VHS layers -->
<div class="vhs-noise"></div>
<div class="vhs-tint"></div>
<div class="vhs-vignette"></div>
<div class="vhs-scanlines"></div>
<div class="vhs-chroma"></div>
<div class="vhs-glitch"></div>
<div class="vhs-roll"></div>
<div class="vhs-flicker"></div>

<!-- HUD -->
<div class="rec-hud">
  <div class="rec-dot"></div>
  <span class="rec-text">REC</span>
</div>
<div class="hud-time" id="hud-time">00:00:00</div>
<div class="hud-date" id="hud-date">30/10/1997</div>
<div class="hud-tape">SP · T-120 · CH03</div>

<!-- Scene -->
<div class="scene">
  <div class="bg-img"></div>

  <div class="figure">
    <div class="eye-glow"></div>
    <img src="data:image/png;base64,${IMG1}" alt="">
  </div>
</div>

<!-- Logout -->
<div class="logout-zone"></div>
<button class="logout-btn" id="logout-btn" onclick="logout()">SAIR</button>

<script>
  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('hud-time').textContent =
      now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  tick(); setInterval(tick,1000);

  // Logout
  function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = '/';
  }

  // Show logout button on hover near corner
  const btn = document.getElementById('logout-btn');
  document.addEventListener('mousemove', e => {
    const near = e.clientX > window.innerWidth - 120 && e.clientY < 80;
    btn.style.color       = near ? 'rgba(200,230,180,0.7)' : 'rgba(200,230,180,0)';
    btn.style.borderColor = near ? 'rgba(200,230,180,0.3)' : 'rgba(200,230,180,0)';
    btn.style.pointerEvents = near ? 'all' : 'none';
  });

  // Occasional heavy glitch burst
  setInterval(() => {
    if (Math.random() > 0.7) {
      document.body.style.transform = 'translateX(' + ((Math.random() - 0.5) * 6) + 'px)';
      setTimeout(() => { document.body.style.transform = ''; }, 60);
    }
  }, 3000);
</script>
</body>
</html>
