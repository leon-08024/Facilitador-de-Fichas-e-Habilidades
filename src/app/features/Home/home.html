<div 
  class="min-h-screen flex items-center justify-center p-4 bg-[url(https://pbs.twimg.com/media/E3JfBXkXMAkL5KX.jpg)] bg-no-repeat bg-cover bg-center h-screen overflow-hidden">
  
  <!-- Overlay escuro para melhorar legibilidade -->
  <div class="absolute inset-0 bg-black/60"></div>

  <div class="w-full max-w-md relative z-10">
    <!-- Logo / Título -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Ordem_Paranormal_RPG_Logo.png">
      </div>
      <h1 class="text-4xl font-bold text-white tracking-tight">FICHAS DIGITAIS
      </h1>
    </div>

    <!-- Card de Login -->
    <div class="bg-zinc-900/80 backdrop-blur-sm border border-zinc-700 rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-semibold text-white mb-6 text-center">Entrar</h2>

      <form (ngSubmit)="onLogin()" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-1.5">Usuário</label>
          <input 
            type="text" 
            [(ngModel)]="username"
            [ngModelOptions]="{standalone: true}"
            class="w-full bg-zinc-800 border border-zinc-700 focus:border-white rounded-2xl px-5 py-3.5 text-white placeholder-zinc-500 focus:outline-none transition"
            placeholder="Bambinelson, etc..."
            required>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-1.5">Senha</label>
          <input 
            type="password" 
            [(ngModel)]="password"
            [ngModelOptions]="{standalone: true}"
            class="w-full bg-zinc-800 border border-zinc-700 focus:border-white rounded-2xl px-5 py-3.5 text-white placeholder-zinc-500 focus:outline-none transition"
            placeholder="••••••••"
            required>
        </div>

        <button 
          type="submit"
          [disabled]="loading"
          class="w-full bg-white hover:bg-zinc-100 active:bg-zinc-200 text-black font-semibold py-4 rounded-2xl transition-all duration-200 flex items-center justify-center text-lg disabled:opacity-70">
          {{ loading ? 'Entrando...' : 'ENTRAR' }}
        </button>
      </form>

      <!-- Mensagem de erro -->
      <div *ngIf="error" class="mt-4 text-red-400 text-center text-sm">
        {{ error }}
      </div>
    </div>

    <p class="text-center text-zinc-600 text-xs mt-8">
      Projeto para mesa • Cauê
    </p>
  </div>
</div>
