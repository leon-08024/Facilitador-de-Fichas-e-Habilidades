<div class="min-h-screen bg-yellow-50 flex flex-col items-center p-8">
  <h1 class="text-5xl font-extrabold text-yellow-500 mb-8 drop-shadow-md">
    Finalizar Pagamento
  </h1>

  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-6">
    <div class="bg-yellow-50 rounded-xl p-4 mb-6">
  <h3 class="font-bold text-yellow-700 mb-3">Seu Pedido ({{ totalItens() }} itens)</h3>
  <div *ngFor="let item of carrinho" class="text-sm text-gray-600 border-b border-yellow-200 py-2 last:border-0">
    <strong>{{ item.quantidade }}x</strong> {{ item.tipo }} com {{ item.molho }}
    <span class="text-xs block">{{ item.estilo }} • {{ item.amor }}</span>
  </div>
  <div class="mt-4 text-xl font-bold text-green-600">
    Total: R$ {{ total }},00
  </div>
</div>

    <form [formGroup]="paymentForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block font-semibold text-yellow-700">Método de Pagamento</label>
        <select formControlName="metodoPagamento" class="w-full p-2 border rounded-lg mt-1">
          <option value="">Selecione...</option>
          <option value="credito">Cartão de Crédito</option>
          <option value="debito">Cartão de Débito</option>
          <option value="pix">PIX</option>
          <option value="boleto">Boleto</option>
          <option value="boleto">Nft</option>
          <option value="boleto">Fiado</option>
        </select>
      </div>

      <div
        *ngIf="paymentForm.get('metodoPagamento')?.value === 'credito' || paymentForm.get('metodoPagamento')?.value === 'debito'">
        <div>
          <label class="block font-semibold text-yellow-700">Nome no Cartão</label>
          <input type="text" formControlName="nomeTitular" class="w-full p-2 border rounded-lg mt-1">
        </div>

        <div>
          <label class="block font-semibold text-yellow-700">Número do Cartão</label>
          <input type="text" formControlName="numeroCartao" mask="0000 0000 0000 0000" placeholder="1234 5678 9012 3456"
            class="w-full p-2 border rounded-lg mt-1">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block font-semibold text-yellow-700">Validade</label>
            <input type="text" formControlName="validade" mask="00/00 "placeholder="MM/AA" class="w-full p-2 border rounded-lg mt-1">
          </div>
          <div>
            <label class="block font-semibold text-yellow-700">CVV</label>
            <input type="text" formControlName="cvv" mask="000" class="w-full p-2 border rounded-lg mt-1">
          </div>
        </div>

        <div>
          <label class="block font-semibold text-yellow-700">Parcelas</label>
          <select formControlName="parcelas" class="w-full p-2 border rounded-lg mt-1">
            <option value="1">À vista</option>
            <option value="2">2x sem juros</option>
            <option value="3">3x sem juros</option>
            <option value="4">3789x sem juros</option>
            <option value="5">5x mas talvez tenha juros</option>
          </select>
        </div>
      </div>

      <div class="flex gap-4 mt-6">
        <button type="button" (click)="voltar()"
          class="flex-1 bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-semibold transition">
          Voltar
        </button>
        <button type="submit"
          class="flex-1 bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition"
          [disabled]="paymentForm.invalid">
          Pagar R$ {{ total }},00
        </button>
      </div>
    </form>
  </div>
</div>
